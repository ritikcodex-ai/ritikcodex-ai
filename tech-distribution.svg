<svg width="420" height="320" viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg">

  <style>
    .title{
      font:600 22px Inter,Segoe UI,sans-serif;
      fill:#E2E8F0;
    }

    .label{
      font:500 14px Inter,Segoe UI,sans-serif;
      fill:#CBD5E1;
    }

    .percent{
      font:700 15px Inter,Segoe UI,sans-serif;
      fill:#F8FAFC;
    }

    .small{
      font:500 13px Inter,Segoe UI,sans-serif;
      fill:#94A3B8;
    }
  </style>

  <rect width="420" height="320" rx="18" fill="#0D1117"/>

  <text x="210" y="35" text-anchor="middle" class="title">
    Tech Distribution
  </text>

  <!-- Background circle -->
  <circle
      cx="210"
      cy="145"
      r="70"
      fill="none"
      stroke="#1E293B"
      stroke-width="18"/>

  <!-- SQL -->
  <circle
      cx="210"
      cy="145"
      r="70"
      fill="none"
      stroke="#3B82F6"
      stroke-width="18"
      stroke-linecap="round"
      stroke-dasharray="154 440"
      transform="rotate(-90 210 145)"/>

  <!-- Python -->
  <circle
      cx="210"
      cy="145"
      r="70"
      fill="none"
      stroke="#FACC15"
      stroke-width="18"
      stroke-linecap="round"
      stroke-dasharray="110 440"
      stroke-dashoffset="-154"
      transform="rotate(-90 210 145)"/>

  <!-- Power BI -->
  <circle
      cx="210"
      cy="145"
      r="70"
      fill="none"
      stroke="#22C55E"
      stroke-width="18"
      stroke-linecap="round"
      stroke-dasharray="88 440"
      stroke-dashoffset="-264"
      transform="rotate(-90 210 145)"/>

  <!-- Excel -->
  <circle
      cx="210"
      cy="145"
      r="70"
      fill="none"
      stroke="#10B981"
      stroke-width="18"
      stroke-linecap="round"
      stroke-dasharray="44 440"
      stroke-dashoffset="-352"
      transform="rotate(-90 210 145)"/>

  <!-- ML -->
  <circle
      cx="210"
      cy="145"
      r="70"
      fill="none"
      stroke="#A855F7"
      stroke-width="18"
      stroke-linecap="round"
      stroke-dasharray="44 440"
      stroke-dashoffset="-396"
      transform="rotate(-90 210 145)"/>

  <text x="210" y="145" text-anchor="middle" class="percent">Data</text>
  <text x="210" y="166" text-anchor="middle" class="small">Analytics</text>

  <!-- Legend -->

  <circle cx="55" cy="245" r="6" fill="#3B82F6"/>
  <text x="70" y="250" class="label">SQL</text>
  <text x="155" y="250" class="percent">35%</text>

  <circle cx="225" cy="245" r="6" fill="#FACC15"/>
  <text x="240" y="250" class="label">Python</text>
  <text x="335" y="250" class="percent">25%</text>

  <circle cx="55" cy="280" r="6" fill="#22C55E"/>
  <text x="70" y="285" class="label">Power BI</text>
  <text x="155" y="285" class="percent">20%</text>

  <circle cx="225" cy="280" r="6" fill="#10B981"/>
  <text x="240" y="285" class="label">Excel</text>
  <text x="315" y="285" class="percent">10%</text>

  <circle cx="55" cy="310" r="6" fill="#A855F7"/>
  <text x="70" y="315" class="label">ML</text>
  <text x="120" y="315" class="percent">10%</text>

</svg>
